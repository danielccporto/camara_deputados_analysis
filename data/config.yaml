overview_summary: |
	A Camara dos Deputados e uma das duas casas do Congresso Nacional do Brasil, sendo a outra o Senado Federal. E composta por 513 deputados, eleitos pelo sistema proporcional, representando os estados e o Distrito Federal. A representacao de cada estado e proporcional a sua populacao, garantindo que regioes mais populosas tenham maior numero de deputados. A principal funcao da Camara e legislar, ou seja, criar e aprovar leis federais que regem o pais. Alem disso, os deputados tambem tem o poder de fiscalizar o governo, aprovar o orcamento anual e julgar crimes de responsabilidade cometidos pelo Presidente da Republica.
